# Pre-commit hooks configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run ruff formatter
      - id: ruff-format
        name: ruff format
        description: Format Python code with ruff
        args: []

      # Run ruff linter
      - id: ruff
        name: ruff lint
        description: Lint Python code with ruff
        args: [--fix]

  # basedpyright - Type checker
  - repo: https://github.com/DetachHead/basedpyright
    rev: v1.23.0
    hooks:
      - id: basedpyright
        name: basedpyright
        description: Run basedpyright type checking
        additional_dependencies: [torch>=2.0.0]

  # pytest - Run tests
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        description: Run pytest test suite
        entry: bash -c 'python -m pytest tests/ -v'
        language: system
        pass_filenames: false
        always_run: true

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Detect secrets
      - id: detect-private-key
        name: detect private keys
        description: Detect private keys in files

      # Trailing whitespace
      - id: trailing-whitespace
        name: trim trailing whitespace
        description: Trim trailing whitespace

      # End of file fixer
      - id: end-of-file-fixer
        name: fix end of files
        description: Ensure files end with a newline

      # Check for large files
      - id: check-added-large-files
        name: check for large files
        description: Prevent committing large files
        args: [--maxkb=1000]

      # Check YAML syntax
      - id: check-yaml
        name: check yaml syntax
        description: Verify YAML files are valid

      # Check TOML syntax
      - id: check-toml
        name: check toml syntax
        description: Verify TOML files are valid

      # Check for merge conflicts
      - id: check-merge-conflict
        name: check for merge conflicts
        description: Check for unresolved merge conflict markers

      # Check case conflicts
      - id: check-case-conflict
        name: check case conflicts
        description: Check for case-insensitive filename conflicts
